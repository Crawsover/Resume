# Render Deployment Configuration

services:
  - type: web
    name: jeremy-crawford-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: portfolio_db
      - key: PYTHON_VERSION
        value: 3.11.0
